name: Build and Push to cachix

on:
  push:
  workflow_dispatch:

jobs:
  build-packages:
    strategy:
      # Continue with the remaining packages if one fails
      fail-fast: false

      matrix:
        os:
          - ubuntu-latest # x86_64-linux
          - ubuntu-24.04-arm # aarch64-linux
          - macos-latest # aarch64-darwin

        package:
          - aim
          - catppuccin-bat
          - catppuccin-yazi-flavor
          - gstack
          - hapi
          - nixvim
          - nixvim-lsp
          - pmp-library
          - vaa3d-x
          - with-secrets
          - zai-mcp-server
          - zotero-mcp

        exclude:
          # vaa3d-x: macOS-only binary, no Linux support
          - os: ubuntu-latest
            package: vaa3d-x
          - os: ubuntu-24.04-arm
            package: vaa3d-x
          # pmp-library: fails to compile on aarch64-linux
          - os: ubuntu-24.04-arm
            package: pmp-library
          # zotero-mcp: dependency build failures on macOS and aarch64-linux
          - os: ubuntu-24.04-arm
            package: zotero-mcp
          - os: macos-latest
            package: zotero-mcp

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        if: github.ref == 'refs/heads/main'
        with:
          name: "${{ secrets.CACHIX_CACHE_NAME }}"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix --accept-flake-config build .#${{ matrix.package }}

  build-nixos-configuration:
    strategy:
      fail-fast: false # Continue with the remaining packages if one fails

      matrix:
        conf:
          - os: ubuntu-24.04-arm
            host: yzx9-rpi5

    runs-on: ${{ matrix.conf.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v16
        if: github.ref == 'refs/heads/main'
        with:
          name: "${{ secrets.CACHIX_CACHE_NAME }}"
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: nix --accept-flake-config build .#nixosConfigurations.${{matrix.conf.host}}.config.system.build.toplevel
